name: Build QuickXecute (Win32)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore QuickXecute.sln

    - name: Build solution (Win32 Release)
      run: msbuild QuickXecute.sln /p:Configuration=Release /p:Platform=Win32 /m

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: QuickXecute-Win32
        path: |
          **/Win32/Release/**
          **/Release/**
          **/*.exe
