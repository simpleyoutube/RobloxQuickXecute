name: Build QuickXecute (x86)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet
      run: nuget restore QuickXecute.sln

    - name: Build solution (Release x86)
      run: msbuild QuickXecute.sln /p:Configuration=Release /p:Platform=x86 /m

    - name: Upload build output
      uses: actions/upload-artifact@v4
      with:
        name: QuickXecute-x86-build
        path: |
          **/Release/**
          **/x86/Release/**
          **/*.exe
